name: Listing Day Breakout Scanner

on:
  schedule:
    # Run every hour during market hours (9:15 AM to 3:30 PM IST)
    # IST is UTC+5:30, so:
    # 9:15 AM IST = 3:45 AM UTC
    # 3:30 PM IST = 10:00 AM UTC
    - cron: '45 3-9 * * 1-5'   # Every hour from 3:45 AM to 9:45 AM UTC (9:15 AM to 3:45 PM IST) - Weekdays
    - cron: '15 4-9 * * 1-5'    # Every hour from 4:15 AM to 9:15 AM UTC (9:45 AM to 2:45 PM IST) - Weekdays
    - cron: '45 10 * * 1-5'     # 10:45 AM UTC (4:15 PM IST) - Weekdays
  workflow_dispatch:
    inputs:
      check_new_ipos:
        description: 'Update listing data for new IPOs first'
        required: false
        default: true
        type: boolean

jobs:
  scan-listing-breakouts:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          set -e
          retry() {
            local attempts="$1"
            shift
            local n=1
            until "$@"; do
              if [ "$n" -ge "$attempts" ]; then
                echo "❌ Command failed after $attempts attempts: $*"
                return 1
              fi
              local wait=$((n * 5))
              echo "⚠️ Attempt $n failed. Retrying in ${wait}s: $*"
              sleep "$wait"
              n=$((n + 1))
            done
          }
          python -m pip install --upgrade pip
          # Install beautifulsoup4 first to satisfy both jugaad-data and yfinance
          echo "📦 Installing beautifulsoup4==4.9.3 first..."
          retry 4 pip install --retries 10 --timeout 120 beautifulsoup4==4.9.3
          # Install main dependencies
          echo "📦 Installing main dependencies..."
          retry 4 pip install --retries 10 --timeout 120 -r requirements.txt
          # Install jugaad-data separately to avoid dependency resolver conflicts
          echo "📦 Installing jugaad-data..."
          retry 4 pip install --retries 10 --timeout 120 "jugaad-data>=0.27,<0.28"
          echo "✅ Dependencies installed successfully"
      
      - name: Set up environment variables
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          IPO_YEARS_BACK: ${{ vars.IPO_YEARS_BACK || '1' }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          echo "Environment variables configured"
          if [ -z "$MONGO_URI" ]; then
            echo "⚠️ WARNING: MONGO_URI is empty! MongoDB dual-write will be disabled."
          else
            echo "✅ MONGO_URI is set"
          fi

      - name: Check MongoDB Connection
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          if [ -n "$MONGO_URI" ]; then
            echo "🔌 Verifying MongoDB Atlas connection..."
            python test_db_connection.py
          else
            echo "⏩ Skipping DB check (MONGO_URI not set)"
          fi
      
      - name: Run Listing Day Breakout Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          IPO_YEARS_BACK: ${{ vars.IPO_YEARS_BACK || '1' }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          python -c "import os; from fetch import fetch_recent_ipo_symbols; fetch_recent_ipo_symbols(years_back=int(os.environ.get('IPO_YEARS_BACK', 1)))"
          echo "✅ IPO list updated"

          echo "🔄 Updating Upstox ID Mappings..."
          python update_upstox_mapping.py
          echo "✅ Upstox ID Mappings updated"
          
          echo "🚀 Starting Listing Day Breakout Scanner..."
          echo "📅 Date: $(date '+%Y-%m-%d')"
          echo "⏰ Time: $(date '+%H:%M:%S')"
          echo "=========================================="
          
          python listing_day_breakout_scanner.py
          
          echo "✅ Scan complete"
      
      - name: Commit and push changes
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Check if there are changes to commit
          if [ -n "$(git status --porcelain)" ]; then
            git add ipo_listing_data.csv ipo_signals.csv ipo_positions.csv logs/ 2>/dev/null || true
            git add
            git commit -m "🤖 Auto-update: Listing day breakout scan results [$(date '+%Y-%m-%d %H:%M:%S')]" || exit 0
            git push || exit 0
          else
            echo "No changes to commit"
          fi

