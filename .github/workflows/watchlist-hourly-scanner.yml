name: Watchlist Hourly Breakout Scanner

on:
  schedule:
    # Run every hour during market hours (9:15 AM to 3:30 PM IST)
    # IST is UTC+5:30, so:
    # 9:15 AM IST = 3:45 AM UTC
    # 3:30 PM IST = 10:00 AM UTC
    - cron: '45 3-9 * * 1-5'   # Every hour from 3:45 AM to 9:45 AM UTC (9:15 AM to 3:45 PM IST) - Weekdays
    - cron: '15 4-9 * * 1-5'    # Every hour from 4:15 AM to 9:15 AM UTC (9:45 AM to 2:45 PM IST) - Weekdays
    - cron: '45 10 * * 1-5'     # 10:45 AM UTC (4:15 PM IST) - Weekdays
  workflow_dispatch:
    inputs:
      force_scan:
        description: 'Force scan even if watchlist is empty'
        required: false
        default: false
        type: boolean

jobs:
  scan-watchlist:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          set -e
          retry() {
            local attempts="$1"
            shift
            local n=1
            until "$@"; do
              if [ "$n" -ge "$attempts" ]; then
                echo "❌ Command failed after $attempts attempts: $*"
                return 1
              fi
              local wait=$((n * 5))
              echo "⚠️ Attempt $n failed. Retrying in ${wait}s: $*"
              sleep "$wait"
              n=$((n + 1))
            done
          }
          python -m pip install --upgrade pip
          # Install beautifulsoup4 first to satisfy both jugaad-data and yfinance
          echo "📦 Installing beautifulsoup4==4.9.3 first..."
          retry 4 pip install --retries 10 --timeout 120 beautifulsoup4==4.9.3
          # Install main dependencies
          echo "📦 Installing main dependencies..."
          retry 4 pip install --retries 10 --timeout 120 -r requirements.txt
          # Install jugaad-data separately to avoid dependency resolver conflicts
          echo "📦 Installing jugaad-data..."
          retry 4 pip install --retries 10 --timeout 120 "jugaad-data>=0.27,<0.28"
          echo "✅ Dependencies installed successfully"
      
      - name: Check watchlist (MongoDB)
        id: check_watchlist
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          if [ -n "$MONGO_URI" ]; then
            ACTIVE_COUNT=$(python check_watchlist_db.py)
            echo "active_count=$ACTIVE_COUNT" >> $GITHUB_OUTPUT
            echo "✅ Found $ACTIVE_COUNT active symbols in MongoDB watchlist"
          else
            echo "active_count=0" >> $GITHUB_OUTPUT
            echo "❌ ERROR: MONGO_URI is missing! MongoDB is now REQUIRED."
            exit 1
          fi
      
      - name: Set up environment variables
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          echo "Environment variables configured"
          if [ -z "$MONGO_URI" ]; then
            echo "❌ ERROR: MONGO_URI is missing!"
            exit 1
          else
            echo "✅ MONGO_URI is set"
          fi

      - name: Check MongoDB Connection
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          if [ -n "$MONGO_URI" ]; then
            echo "🔌 Verifying MongoDB Atlas connection..."
            python test_db_connection.py
          else
            echo "❌ ERROR: MONGO_URI missing"
            exit 1
          fi
      
      - name: Run Hourly Breakout Scanner
        if: steps.check_watchlist.outputs.active_count > 0 || github.event.inputs.force_scan == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          echo "🔄 Updating Upstox ID Mappings..."
          python update_upstox_mapping.py
          echo "✅ Upstox ID Mappings updated"
          
          echo "🚀 Starting Hourly Intraday Breakout Scanner..."
          echo "📅 Date: $(date '+%Y-%m-%d')"
          echo "⏰ Time: $(date '+%H:%M:%S')"
          echo "=========================================="
          
          python hourly_breakout_scanner.py
          
          echo "✅ Scan complete"
      
      - name: Skip scan (no active symbols)
        if: steps.check_watchlist.outputs.active_count == 0 && github.event.inputs.force_scan != 'true'
        run: |
          echo "⏭️ Skipping scan - no active symbols in watchlist (MongoDB)"
      
      - name: Scan Complete
        run: echo "Watchlist hourly scan completed successfully."
