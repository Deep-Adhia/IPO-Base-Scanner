name: IPO Scanner v2 (Consolidation-Based)

on:
  schedule:
    - cron: '45 08 * * 1-5'   # Daily scan: 2:15 PM IST (8:45 AM UTC) - Weekdays
    - cron: '15 09 * * 0'     # Weekly summary: Sunday 2:45 PM IST (9:15 AM UTC)
    - cron: '15 09 1 * *'     # Monthly review: 1st of month 2:45 PM IST (9:15 AM UTC)
  workflow_dispatch:
    inputs:
      mode:
        description: 'scan | stop_loss_update | weekly_summary | monthly_review | heartbeat'
        required: true
        default: 'scan'
        type: choice
        options:
          - scan
          - stop_loss_update
          - weekly_summary
          - monthly_review
          - heartbeat
      environment:
        description: 'Environment to use (production, staging, development)'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development

jobs:
  run-scanner-v2:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Clean up old Python caches
        run: |
          echo "Cleaning up old Python cache directories..."
          rm -rf ~/.cache/pip-old 2>/dev/null || true
          echo "Old Python caches cleaned up"
      
      - name: Cache Python dependencies
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-v2-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-
      
      - name: Install Python dependencies
        run: |
          set -e
          retry() {
            local attempts="$1"
            shift
            local n=1
            until "$@"; do
              if [ "$n" -ge "$attempts" ]; then
                echo "❌ Command failed after $attempts attempts: $*"
                return 1
              fi
              local wait=$((n * 5))
              echo "⚠️ Attempt $n failed. Retrying in ${wait}s: $*"
              sleep "$wait"
              n=$((n + 1))
            done
          }
          python -m pip install --upgrade pip
          # Install beautifulsoup4 first to satisfy both jugaad-data and yfinance
          echo "📦 Installing beautifulsoup4==4.9.3 first..."
          retry 4 pip install --retries 10 --timeout 120 beautifulsoup4==4.9.3
          # Install main dependencies
          echo "📦 Installing main dependencies..."
          retry 4 pip install --retries 10 --timeout 120 -r requirements.txt
          # Install jugaad-data separately to avoid dependency resolver conflicts
          echo "📦 Installing jugaad-data..."
          retry 4 pip install --retries 10 --timeout 120 "jugaad-data>=0.27,<0.28"
          echo "✅ Dependencies installed successfully"
      
      - name: Show workflow mode and timing
        run: |
          echo "🚀 =========================================="
          echo "🚀 IPO Scanner Workflow v2 Started (MongoDB-Only)"
          echo "🚀 =========================================="
          echo "📅 Current UTC: $(date -u +%Y-%m-%d\ %H:%M:%S)"
          echo "📅 Current IST: $(TZ='Asia/Kolkata' date +%Y-%m-%d\ %H:%M:%S)"
          echo "🔄 Event: ${{ github.event_name }}"
          echo "📋 Branch: ${{ github.ref }}"
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "🎯 Mode: ${{ github.event.inputs.mode }} (Manual Trigger)"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "⏰ Schedule that triggered: ${{ github.event.schedule }}"
            echo "📊 Mode: Scheduled Run"
          else
            echo "🎯 Mode: Default (scan)"
          fi
          echo "🚀 =========================================="
      
      - name: Debug environment variables
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          IPO_YEARS_BACK: ${{ secrets.IPO_YEARS_BACK }}
          STOP_PCT: ${{ vars.STOP_PCT || '0.03' }}
          PT_A_PLUS: ${{ vars.PT_A_PLUS || '0.15' }}
          PT_B: ${{ vars.PT_B || '0.12' }}
          PT_C: ${{ vars.PT_C || '0.10' }}
          CONSOL_WINDOWS: ${{ vars.CONSOL_WINDOWS || '10,20,40,80,120' }}
          VOL_MULT: ${{ vars.VOL_MULT || '1.2' }}
          ABS_VOL_MIN: ${{ vars.ABS_VOL_MIN || '3000000' }}
          LOOKAHEAD: ${{ vars.LOOKAHEAD || '80' }}
          MAX_DAYS: ${{ vars.MAX_DAYS || '200' }}
          MAX_FLAT_HOLD_WEEKS: ${{ vars.MAX_FLAT_HOLD_WEEKS || '20' }}
          CACHE_FILE: ${{ vars.CACHE_FILE || 'ipo_cache.pkl' }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          echo "=== Environment Variables Debug ==="
          echo "🔐 Secrets:"
          echo "TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:0:10}..." 
          echo "TELEGRAM_CHAT_ID: $TELEGRAM_CHAT_ID"
          echo ""
          
          if [ -z "$TELEGRAM_CHAT_ID" ] || [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "❌ ERROR: Telegram credentials missing!"
            exit 1
          fi
          
          if [ -z "$MONGO_URI" ]; then
            echo "❌ ERROR: MONGO_URI is missing! MongoDB is now REQUIRED."
            exit 1
          else
            echo "✅ MONGO_URI is set"
          fi
      
      - name: Check MongoDB Connection
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          if [ -n "$MONGO_URI" ]; then
            echo "🔌 Verifying MongoDB Atlas connection..."
            python test_db_connection.py
          else
            echo "❌ ERROR: MONGO_URI missing"
            exit 1
          fi
      
      - name: Run Consolidation-Based Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
          IPO_YEARS_BACK: ${{ secrets.IPO_YEARS_BACK }}
          STOP_PCT: ${{ vars.STOP_PCT || '0.03' }}
          PT_A_PLUS: ${{ vars.PT_A_PLUS || '0.15' }}
          PT_B: ${{ vars.PT_B || '0.12' }}
          PT_C: ${{ vars.PT_C || '0.10' }}
          CONSOL_WINDOWS: ${{ vars.CONSOL_WINDOWS || '10,20,40,80,120' }}
          VOL_MULT: ${{ vars.VOL_MULT || '1.2' }}
          ABS_VOL_MIN: ${{ vars.ABS_VOL_MIN || '3000000' }}
          LOOKAHEAD: ${{ vars.LOOKAHEAD || '80' }}
          MAX_DAYS: ${{ vars.MAX_DAYS || '200' }}
          MAX_FLAT_HOLD_WEEKS: ${{ vars.MAX_FLAT_HOLD_WEEKS || '20' }}
          CACHE_FILE: ${{ vars.CACHE_FILE || 'ipo_cache.pkl' }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          echo "🔄 Updating Upstox ID Mappings..."
          python update_upstox_mapping.py
          echo "✅ Upstox ID Mappings updated"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            echo "🎯 Running consolidation-based scanner in mode: $MODE"
            python streamlined_ipo_scanner.py $MODE
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            SCHEDULE="${{ github.event.schedule }}"
            case "$SCHEDULE" in
              "45 08 * * 1-5")
                python streamlined_ipo_scanner.py scan
                python streamlined_ipo_scanner.py stop_loss_update
                ;;
              "15 09 * * 0")
                python streamlined_ipo_scanner.py weekly_summary
                ;;
              "15 09 1 * *")
                python streamlined_ipo_scanner.py monthly_review
                ;;
              *)
                python streamlined_ipo_scanner.py scan
                ;;
            esac
          else
            python streamlined_ipo_scanner.py scan
          fi
      
      - name: Workflow Complete
        run: echo "IPO Scanner v2 workflow completed successfully."
